# ── Server ──────────────────────────────────────────────────
server.port=8080

# ── DataSource ──────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── File Upload ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
canvara.upload.dir=uploads/artworks
canvara.upload.base-url=http://localhost:8080/uploads/artworks

# ── JWT ─────────────────────────────────────────────────────
canvara.jwt.secret=changeThisToA256BitSecretKeyInProduction!!
canvara.jwt.expiration-ms=86400000

# ── CORS ────────────────────────────────────────────────────
canvara.cors.allowed-origins=http://localhost:5173
